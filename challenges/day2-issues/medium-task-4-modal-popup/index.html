<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 2 - Medium Task 4: Modal Popup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="content">
      <h1>Modal Popup Demo</h1>
      <p>Click the button to open an accessible modal dialog with overlay and close controls.</p>
      <button class="open-modal" id="openModal">Open Modal</button>
    </main>

    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="close-btn" id="closeModal" aria-label="Close modal">✕</button>
        <h2 id="modalTitle">Get started with the challenge</h2>
        <p>This modal presents a responsive, accessible overlay and keyboard support.</p>
        <div class="modal-actions">
          <button class="primary">Take action</button>
          <button class="secondary" id="cancelModal">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
